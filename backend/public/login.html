




<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iyome Invest - Login</title>

  <style>
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    .card {
      width: 350px;
      padding: 30px;
      border: 2px solid #ff9900;
      border-radius: 20px;
      background: #111;
      text-align: center;
    }

    h1 {
      color: #ff9900;
      margin-bottom: 5px;
    }

    p.subtitle {
      color: #aaa;
      margin-top: 0;
      margin-bottom: 20px;
    }

    .tabs {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #555;
      background: transparent;
      color: #fff;
      cursor: pointer;
      margin: 5px;
    }

    .tab-btn.active {
      background: #ff9900;
      border: none;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 15px;
    }

    .main-btn {
      width: 100%;
      padding: 12px;
      border-radius: 25px;
      background: #ff9900;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      border: none;
      margin-top: 10px;
    }

    a {
      color: #ff9900;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Iyome Invest</h1>
    <p class="subtitle">Secure Investment & Profit Sharing</p>

    <div class="tabs">
      <button class="tab-btn active">Login</button>
      <button class="tab-btn" onclick="window.location.href='signup.html'">Sign Up</button>
    </div>

    <form id="loginForm">
    <input type="email" id="email" placeholder="Email"  required/>
    <input type="password" id="password" placeholder="Password"  required/>

    <button type="submit" id="loginBtn" class="main-btn">Login</button>
    </form>

    <p style="margin-top:15px;">Admin?  
      <a href="admin-login.html">Go to admin login</a>
    </p>
  </div>

  <script src="js/authFetch.js"></script>
  <script src="js/login.js"></script>
 
</body>
</html>
