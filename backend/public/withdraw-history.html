<!DOCTYPE html>
<html>
<head>
  <title>Withdrawal History</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: center;
      font-size: 14px;
    }

    th {
      background: #0a8f4d;
      color: white;
    }

    .pending { color: orange; font-weight: bold; }
    .approved { color: green; font-weight: bold; }
    .failed { color: red; font-weight: bold; }

    .empty {
      text-align: center;
      padding: 20px;
      color: #777;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 5px;
      cursor: pointer;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>My Withdrawal History</h2>

  <button onclick="loadWithdrawals()">Refresh</button>

  <table>
    <thead>
      <tr>
        <th>Amount (XAF)</th>
        <th>Phone</th>
        <th>Status</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="history"></tbody>
  </table>
</div>

<script src="/js/withdraw-history.js"></script>
</body>
</html>
