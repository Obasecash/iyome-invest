<h3>Withdraw via Orange Money</h3>

<input id="amount" type="number" placeholder="Amount (XAF)" />
<input id="phone" placeholder="Orange Number (6xxxxxxxx)" />

<button onclick="orangeWithdraw()">Withdraw Now</button>

<p id="msg"></p>

<script>
async function orangeWithdraw() {
  const amount = document.getElementById("amount").value;
  const phone = document.getElementById("phone").value;
  const token = localStorage.getItem("token");

  document.getElementById("msg").innerText = "Processing...";

  const res = await fetch("/api/orange-withdraw/auto", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({ amount, phone })
  });

  const data = await res.json();
  document.getElementById("msg").innerText = data.message;
}
</script>
